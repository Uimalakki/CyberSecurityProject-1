<!DOCTYPE html>
<html>
  <head>
    <title>CSB Project 1 - Register</title>
  </head>
  <body>
    <h4>Register new user: (Flaw 4)</h4>
    <p>This form has no password validation.</p>
    <form method="POST">
      {% csrf_token %}
      <label>Username:</label><br/>
      <input type="text" name="username"/><br/>
      <label>Password:</label><br/>
      <input type="password" name="password"/><br/>
      <button type="submit">Login</button>
    </form>
  </body>
</html>
