<!DOCTYPE html>
<html>
  <head>
    <title>CSB Project 1 - Login</title>
  </head>
  <body>
    <h1>Log in</h1>
    <form method="post">
      {% csrf_token %}
      <label>Username:</label><br/>
      <input type="text" name="username"/><br/>
      <label>Password:</label><br/>
      <input type="password" name="password"/><br/>
      <button type="submit">Login</button>
    </form><br/>
    <a href="{% url 'polls:register' %}">Register new user</a><br/>
  </body>
</html>
